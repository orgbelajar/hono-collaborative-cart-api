name: Continuous Integration

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: "postgresql://postgres:${{ secrets.DB_PASSWORD }}@localhost:5432/honoecommerceapp_test?schema=public"
      NODE_ENV: "test"

    strategy:
      matrix:
        bun-version: [1.1.x, latest]

    # Membuat container database, redis, dan nats sementara untuk keperluan testing CI
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: honoecommerceapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:8.4.2-alpine3.22
        ports:
          - 6379:6379
          
      nats:
        image: nats:2.12.5-alpine3.22
        ports:
          - 4222:4222
          - 8222:8222
        # Setup nats server with JetStream enabled
        options: --name nats-message-broker -js

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
          cache: true

      - name: Install Dependencies
        run: bun install

      - name: Run Linter
        run: bun run lint

      - name: Wait for DB
        run: sleep 5

      - name: Generate Prisma Client & Run Migrations
        run: |
          bunx prisma generate
          bunx prisma migrate deploy

      - name: Run Bun Tests
        run: bun test
        env:
          ACCESS_TOKEN_KEY: ${{ secrets.ACCESS_TOKEN_KEY }}
          REFRESH_TOKEN_KEY: ${{ secrets.REFRESH_TOKEN_KEY }}
          REDIS_URL: "redis://localhost:6379"
          NATS_URL: "nats://localhost:4222"

  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
