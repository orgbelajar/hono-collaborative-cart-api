name: Continuous Integration

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:${{ secrets.DB_PASSWORD }}@localhost:5432/honoecommerceapp_test?schema=public
      NODE_ENV: test

    strategy:
      fail-fast: false
      matrix:
        bun-version: ["1.1.38", "latest"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: honoecommerceapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d honoecommerceapp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
          - 8222:8222
        options: >-
          --health-cmd "wget --spider -q http://localhost:8222/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        command: -js

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Linter
        run: bun run lint

      - name: Wait for Postgres readiness
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d honoecommerceapp_test && exit 0
            echo "Waiting for postgres..."
            sleep 2
          done
          echo "Postgres not ready in time"
          exit 1
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Generate Prisma Client & Run Migrations
        run: |
          bunx prisma generate
          bunx prisma migrate deploy

      - name: Run Bun Tests
        run: bun test
        env:
          ACCESS_TOKEN_KEY: ${{ secrets.ACCESS_TOKEN_KEY }}
          REFRESH_TOKEN_KEY: ${{ secrets.REFRESH_TOKEN_KEY }}
          REDIS_URL: redis://localhost:6379
          NATS_URL: nats://localhost:4222

  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}