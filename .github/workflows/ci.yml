name: Continuous Integration

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: "postgresql://postgres:${{ secrets.DB_PASSWORD }}@localhost:5432/honoecommerceapp_test?schema=public"
      NODE_ENV: "test"

    strategy:
      matrix:
        bun-version: [1.1.x, latest]

    # Membuat container database, redis, dan nats sementara untuk keperluan testing CI
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: honoecommerceapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
          - 8222:8222
        # AKTIVASI JETSTREAM: Gunakan 'command', bukan 'options'
        command: -js
        options: >-
          --health-cmd "nc -z localhost 4222"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Mask Sensitive Secrets
        run: |
          echo "::add-mask::${{ secrets.DB_PASSWORD }}"
          echo "::add-mask::${{ secrets.ACCESS_TOKEN_KEY }}"
          echo "::add-mask::${{ secrets.REFRESH_TOKEN_KEY }}"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
          cache: true

      - name: Install Dependencies
        run: bun install

      - name: Run Linter
        run: bun run lint

      - name: Wait for Services to be Ready
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done
          echo "PostgreSQL is ready!"

          echo "Waiting for NATS..."
          until curl -sf http://localhost:8222/healthz > /dev/null 2>&1; do
            sleep 1
          done
          echo "NATS is ready!"

          echo "All services are ready!"

      - name: Generate Prisma Client & Run Migrations
        run: |
          bunx prisma generate
          bunx prisma migrate deploy

      - name: Run Bun Tests
        run: bun test
        env:
          ACCESS_TOKEN_KEY: ${{ secrets.ACCESS_TOKEN_KEY }}
          REFRESH_TOKEN_KEY: ${{ secrets.REFRESH_TOKEN_KEY }}
          REDIS_URL: "redis://localhost:6379"
          NATS_URL: "nats://localhost:4222"

  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
